name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    name: Release crates
    environment: cargo

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install MSRV toolchain
        run: rustup toolchain install 1.85.0

      - name: Extract version
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"

          semver_regex='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*))?$'

          if [[ ! "${version}" =~ ${semver_regex} ]]; then
            echo "::error::Tag must be SemVer, for example 0.16.0 or 0.16.0-rc.1"
            exit 1
          fi

          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Validate package versions
        run: |
          set -euo pipefail

          macro_version="$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "unleash-api-client-macros") | .version')"

          sdk_version="$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "unleash-api-client") | .version')"

          if [[ "${macro_version}" != "${VERSION}" ]]; then
            echo "::error::unleash-api-client-macros version is ${macro_version}, expected ${VERSION}"
            exit 1
          fi

          if [[ "${sdk_version}" != "${VERSION}" ]]; then
            echo "::error::unleash-api-client version is ${sdk_version}, expected ${VERSION}"
            exit 1
          fi

      - name: Validate package metadata
        run: cargo metadata --format-version 1 --no-deps --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Dry-run publish unleash-api-client-macros
        run: cargo publish \
          --manifest-path crates/unleash-api-client-macros/Cargo.toml \
          --locked \
          --dry-run

      - name: Publish unleash-api-client-macros
        run: cargo publish \
          --manifest-path crates/unleash-api-client-macros/Cargo.toml \
          --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN_MACROS }}

      - name: Dry-run publish unleash-api-client
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            if cargo publish \
              --manifest-path crates/unleash-api-client/Cargo.toml \
              --locked \
              --dry-run; then
              exit 0
            fi

            if [[ "${attempt}" == "5" ]]; then
              exit 1
            fi

            sleep 60
          done

      - name: Publish unleash-api-client
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            if cargo publish \
              --manifest-path crates/unleash-api-client/Cargo.toml \
              --locked; then
              exit 0
            fi

            if [[ "${attempt}" == "5" ]]; then
              exit 1
            fi

            sleep 60
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}